name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: rm -rf public/tinymce && mkdir -p public/tinymce && cp -R node_modules/tinymce/* public/tinymce/
      - run: pnpm build

  backend:
    name: Backend smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: |
          PYTHONPATH=. python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app
          client = TestClient(app)
          assert client.get('/api/v1/health').status_code == 200
          templates = client.get('/api/v1/templates')
          assert templates.status_code == 200
          template_id = templates.json()[0]['id']
          doc = client.post('/api/v1/documents', json={
              'template_id': template_id,
              'plan_name': 'CI Test Plan',
              'contract_number': 'H0000',
              'plan_year': 2026,
              'language': 'en-US'
          })
          assert doc.status_code == 200, doc.text
          document_id = doc.json()['id']
          assert client.post(f'/api/v1/documents/{document_id}/compliance-check').status_code == 200
          assert client.post(f'/api/v1/documents/{document_id}/exports/html').status_code == 200
          PY
